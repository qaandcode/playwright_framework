name: Production Smoke — Post Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        default: prod
        options: [staging, prod]
  # Trigger from your deployment workflow:
  # workflow_run:
  #   workflows: ["Deploy to Production"]
  #   types: [completed]

jobs:
  smoke:
    name: Post-deploy smoke — ${{ github.event.inputs.environment || 'prod' }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=chromium --grep @smoke
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'prod' }}
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.PROD_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.PROD_TEST_USER_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-prod-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
